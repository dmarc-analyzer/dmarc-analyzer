<!doctype html>
<html lang="en">

<head>
      <meta charset="utf-8">
      <title>DMARC Analyzer</title>
      <meta name="viewport"
            content="width=device-width, initial-scale=1">
      <base href="/">

      <link rel="icon"
            type="image/png"
            sizes="48x48"
            href="assets/img/favicon.ico">

      <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500"
            rel="stylesheet">
      <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
            rel="stylesheet">
      <script>
      // Provide global.window object
      window.global = {window};
      </script>
      <!-- Provide unsupported warning for IE users -->
      <script>
            var ie = 0;
            try { ie = navigator.userAgent.match(/(MSIE |Trident.*rv[ :])([0-9]+)/)[2]; }
            catch (e) { }
            if (ie > 0) {
                  alert('DMARC Analyzer does not support Internet Explorer!\nCurrent versions of Edge, Chrome, Firefox, Safari, and Opera are supported.');
                  location.replace('https://github.com/cisagov/dmarc-analyze');
            }
      </script>

  <meta name="theme-color" content="#424242">
</head>

<body>
      <noscript>
        <p>We've detected that JavaScript is disabled in your browser. Please enable to continue to DMARC Analyzer.</p>
      </noscript>
      <app-root></app-root>

</body>

</html>
